# ---
# Prefix
# ---
set -g prefix C-a
bind-key C-a send-prefix


# リロードを Prefix -> r
# リロード時にメッセージを出す
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Reload Config!!"

# Alt+F11 でサーバーを kill
bind-key -n M-F11 confirm-before 'run-shell "~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh; tmux kill-server"'

# Alt+F12 でデタッチ
bind-key -n M-F12 detach-client


# ---
# Status bar
# ---
set -g status-position top
set -g status-style "bg=white fg=black"

# "[Window] {ウィンドウリスト}" の形にする
# アクティブなウィンドウは反転+ << >> で囲う
#set -g window-status-current-format "#[reverse] #I:#W "
#set -g window-status-format " #I:#W "
# #{?client_prefix,...,...} で prefix が押されているかを判定
# 押されている間は左端に反転表示で "PREFIX" を表示、離すと消える
set -g status-format[0] "#{?client_prefix,#[reverse] PREFIX #[noreverse] ,}#[bg=colour235 fg=colour34 align=left] [Window] #{W: #I:#W ,#[reverse] <<#I:#W>> #[noreverse]}#[align=right bg=default fg=black] Alt+W: new-window  Alt+D: kill-window  Alt+Del: kill-pane  Alt+F12: detach "

# 2行目にペイン一覧を常時表示
# アクティブなペインは反転表示、ズーム中は [ZOOM] を表示
set -g status-format[1] "#[bg=colour235 fg=yellow align=left]#{?window_zoomed_flag, [ZOOM],} [ Pane ]#{P: #{?pane_active,#[reverse] #P:#{pane_current_command} #[noreverse], #P:#{pane_current_command} }}"
set -g status 2


# ---
# Window name
# ---
# ウィンドウ名にカレントディレクトリ名(basename)を自動表示
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# ---
# New window
# ---
bind-key -n M-w new-window


# ---
# Window navigation
# ---
bind-key -n S-Right next-window
bind-key -n S-Left  previous-window
bind-key -n M-d confirm-before 'kill-window'


# ---
# Terminal color support
# ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"


# ---
# Pane header
# ---
set -g pane-border-status top

# アクティブなペインかどうかで文字色・枠線色を変更
# ペインボーダーにヘッダとして情報表示
set -g pane-border-style        "fg=colour243"
set -g pane-active-border-style "fg=cyan"
set -g pane-border-format "#{?pane_active,#[fg=cyan],#[fg=colour243]} #P: #{pane_current_command} - #{pane_current_path} #(~/.config/tmux/git-pane-info.sh #{pane_current_path}) "


# ---
# Pane appearance
# ---
# 非アクティブ: 背景をわずかに暗く(colour235)、文字をグレーアウト(colour243)
# アクティブ:   背景・文字ともにターミナルのデフォルト色
set -g window-style        "fg=colour243,bg=colour235"
set -g window-active-style "fg=terminal,bg=terminal"


# ---
# Pane deletion
# ---
bind-key -n M-DC kill-pane


# ---
# Pane navigation (no wrap)
# ---
bind-key -n M-Up    if-shell "[ #{pane_at_top}    -eq 0 ]" "select-pane -U"
bind-key -n M-Down  if-shell "[ #{pane_at_bottom} -eq 0 ]" "select-pane -D"
bind-key -n M-Left  if-shell "[ #{pane_at_left}   -eq 0 ]" "select-pane -L"
bind-key -n M-Right if-shell "[ #{pane_at_right}  -eq 0 ]" "select-pane -R"


# ---
# Pane resize
# ---
bind-key -n M-] resize-pane -R 5
bind-key -n M-[ resize-pane -L 5
bind-key -n M-PPage resize-pane -U 5
bind-key -n M-NPage resize-pane -D 5

# Alt + Z でペインをズーム（拡大表示トグル）
bind-key -n M-z resize-pane -Z


# ---
# Copy mode
# ---
# vi キーバインドを使用
set-window-option -g mode-keys vi

# Alt + A でコピーモード
bind-key -n M-a copy-mode

# Windows (WSL) クリップボードサポート
# y / Enter でコピーして clip.exe に渡す
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel 'clip.exe'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'clip.exe'


# ---
# Layout presets (no prefix)
# ---
bind-key -n M-1 select-layout even-horizontal
bind-key -n M-2 select-layout even-vertical
bind-key -n M-3 select-layout main-horizontal
bind-key -n M-4 select-layout main-vertical
bind-key -n M-5 select-layout tiled


# ---
# Pane splitting
# ---
bind-key -n M-\\ split-window -h
bind-key -n M--  split-window -v



# ---
# Plugins (TPM)
# ---
# Prefix + I でインストールが必要

# TPM の有効化
set -g @plugin 'tmux-plugins/tpm'

# https://github.com/tmux-plugins/tmux-sensible
# みんな入れておくといい、らしい
set -g @plugin 'tmux-plugins/tmux-sensible'

# tmux 状況の保存
set -g @plugin 'tmux-plugins/tmux-resurrect'
# tmux-ressurect の自動実行
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '3'
if-shell 'test -e "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect/last"' 'set -g @continuum-restore on'

# 必ず末尾に置く
run '~/.tmux/plugins/tpm/tpm'
